<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #060a06; }
  a { color: #ffc27a; }
  .term { font-size: 13.5px; }
  @media (max-width: 640px) { .term { font-size: calc((100vw - 20px) / 24.4); } }
  .term pre { margin: 0 0 14px; white-space: pre; font: inherit; line-height: 1.3; letter-spacing: 0; text-shadow: 0 0 3px rgba(120,240,150,.28); }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes flick { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.85} 94%{opacity:1} }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #1f3a26; border-radius: 3px; }
</style>
</helmet>

<div class="term" style="min-height:100vh;background:radial-gradient(120% 90% at 50% 0%, #0b140c 0%, #060a06 70%);color:#a7bcac;font-family:ui-monospace,'DejaVu Sans Mono','Menlo','Consolas','Liberation Mono',monospace;padding:22px 10px 60px;animation:flick 6s infinite;">
  <div style="width:max-content;max-width:100%;margin:0 auto;">

    <pre style="color:#d7e8db;">{{ header }}</pre>

    <div style="display:flex;flex-wrap:wrap;gap:16px;margin:0 2px 16px;font-weight:600;">
      <a onclick="{{ onRefresh }}" style="color:#ffc27a;text-decoration:none;cursor:pointer;" style-hover="color:#eafff0;text-shadow:0 0 7px #1DB954;">[ F5 yenile ]</a>
      <a onclick="{{ onTrigger }}" style="color:#ffc27a;text-decoration:none;cursor:pointer;" style-hover="color:#eafff0;text-shadow:0 0 7px #1DB954;">[ &gt;&gt; şimdi güncelle ]</a>
      <a href="{{ playlistUrl }}" target="_blank" style="color:#ffc27a;text-decoration:none;cursor:pointer;" style-hover="color:#eafff0;text-shadow:0 0 7px #1DB954;">[ playlist -&gt; ]</a>
      <span style="color:#3ddc84;animation:blink 1.1s step-end infinite;">_</span>
    </div>

    <pre style="color:#8fd0a6;">{{ statsBlock }}</pre>
    <pre>{{ chartBlock }}</pre>
    <pre style="color:#9fb4a4;">{{ triggerBlock }}</pre>
    <pre style="color:#d8bd8a;">{{ strategyBlock }}</pre>
    <pre style="color:#a9c2d4;">{{ moodBlock }}</pre>
    <pre>{{ feedbackBlock }}</pre>
    <pre style="color:#c6b3d6;">{{ learnBlock }}</pre>
    <pre style="color:#a9c2b0;">{{ archiveBlock }}</pre>

    <div style="display:flex;flex-wrap:wrap;gap:16px;margin:0 2px 18px;font-weight:600;">
      <a onclick="{{ onExcel }}" style="color:#ffc27a;text-decoration:none;cursor:pointer;" style-hover="color:#eafff0;text-shadow:0 0 7px #1DB954;">[ excel indir v ]</a>
    </div>

    <pre style="color:#5f7d70;text-shadow:none;font-size:.86em;">{{ footer }}</pre>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const mobile = typeof window !== 'undefined' && window.matchMedia('(max-width:640px)').matches;
    this.state = { model: null, cols: mobile ? 40 : 84, online: false, status: 'bağlanıyor' };
    this.GIST = 'c7f3586cfc005a161864dcc3a624bd09';
    this.BOT_REPO = 'https://github.com/saidcim/spotibot';
  }

  componentDidMount() {
    this._mm = window.matchMedia('(max-width:640px)');
    this._onMM = e => this.setState({ cols: e.matches ? 40 : 84 });
    this._mm.addEventListener ? this._mm.addEventListener('change', this._onMM) : this._mm.addListener(this._onMM);
    this.load();
    this._timer = setInterval(() => this.load(), 120000);
  }
  componentWillUnmount() {
    clearInterval(this._timer);
    this._mm && (this._mm.removeEventListener ? this._mm.removeEventListener('change', this._onMM) : this._mm.removeListener(this._onMM));
  }

  async load() {
    try {
      const res = await fetch(`https://api.github.com/gists/${this.GIST}`, { headers: { Accept: 'application/vnd.github+json' }, cache: 'no-store' });
      if (!res.ok) throw new Error('http ' + res.status);
      const gist = await res.json();
      const file = gist.files && gist.files['bot_state.json'];
      if (!file) throw new Error('no state file');
      let content = file.content;
      if (file.truncated && file.raw_url) content = await (await fetch(file.raw_url, { cache: 'no-store' })).text();
      const state = JSON.parse(content);
      this.setState({ model: this.buildModel(state), online: true, status: 'çevrimiçi' });
    } catch (e) {
      this.setState({ model: this.state.model || this.sample(), online: false, status: 'çevrimdışı · örnek veri' });
    }
  }

  // ---------- data ----------
  fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); } catch { return '—'; } }
  ago(iso) { if (!iso) return ''; const d = Math.floor((Date.now() - new Date(iso)) / 1000); if (d < 60) return 'az önce'; if (d < 3600) return Math.floor(d / 60) + ' dk önce'; if (d < 86400) return Math.floor(d / 3600) + ' saat önce'; return Math.floor(d / 86400) + ' gün önce'; }
  num(v, d) { return (v === undefined || v === null) ? (d ?? '—') : (typeof v === 'number' ? (Number.isInteger(v) ? String(v) : v.toFixed(1)) : String(v)); }

  buildModel(s) {
    const fh = s.feedback_history || [], mh = s.mood_history || [], arc = s.playlist_archive || [];
    const lastF = fh[fh.length - 1] || {}, lastM = mh[mh.length - 1] || {}, lastA = arc[arc.length - 1] || {};
    const dyn = s.dynamic_config || {}, prof = s.user_profile || {}, met = prof.adaptation_metrics || {};
    const plays = s.cumulative_plays ? Object.values(s.cumulative_plays).reduce((a, b) => a + b, 0) : null;
    const chart = fh.slice(-6);
    const patterns = (prof.learned_patterns || []).slice();
    if (prof.next_advice) patterns.push('* ' + prof.next_advice);
    return {
      cycle: this.num(s.cycle, 0), lastUpdate: this.fmtDate(s.last_update), lastAgo: this.ago(s.last_update),
      moodNow: lastM.mood || '—', energyNow: lastM.energy_level || '—',
      aiScore: this.num(lastF.score), realScore: this.num(lastF.engagement_score),
      discovery: this.num(lastA.discovery_count),
      carry: this.num(dyn.carry_over), discoveryQ: this.num(lastA.discovery_count), plays: this.num(plays),
      strategyReason: dyn.tune_reason || 'Henüz ayar gerekçesi yok.',
      chartAi: chart.map(f => f.score ?? 0), chartEng: chart.map(f => (f.engagement_score ?? f.score ?? 0)), chartCycles: chart.map(f => f.cycle),
      moods: mh.slice().reverse().map(m => ({ mood: m.mood || '—', energy: m.energy_level || 'orta', date: this.fmtDate(m.date), trigger: m.trigger || 'Otomatik', summary: m.summary || '', tags: (m.dominant_genres || []).concat(m.top_artists_this_period || []) })),
      feedbacks: fh.slice().reverse().map(f => ({ cycle: f.cycle, score: this.num(f.score), eng: this.num(f.engagement_score), aiPct: (f.score || 0) * 10, engPct: (f.engagement_score || 0) * 10, analysis: f.analysis || '—', date: this.fmtDate(f.date), avg: this.num(f.avg_plays, '0') })),
      patterns, adaptBadge: (met.improvement_delta !== undefined) ? `güven %${Math.round((met.confidence || 0) * 100)} · iyileşme ${met.improvement_delta >= 0 ? '+' : ''}${met.improvement_delta.toFixed(1)}` : 'öğrenme birikiyor',
      archive: arc.slice().reverse().map(a => ({ cycle: a.cycle, date: this.fmtDate(a.archived_at), mood: a.mood || '—', ai: this.num(a.score), eng: this.num(a.engagement_score), disc: this.num(a.discovery_count), avg: this.num(a.avg_plays, '0') })),
      playlistUrl: s.playlist_id ? `https://open.spotify.com/playlist/${s.playlist_id}` : 'https://open.spotify.com/',
    };
  }

  sample() {
    return {
      cycle: '47', lastUpdate: '18 Tem 22:40', lastAgo: '2 saat önce',
      moodNow: 'Sakin & Odaklı', energyNow: 'orta', aiScore: '7.8', realScore: '6.9', discovery: '12',
      carry: '8', discoveryQ: '5', plays: '341',
      strategyReason: 'Gercek skor AI skorunun altında kaldı; taşıma limiti 6->8 artırıldı, daha çok beğenilen şarkı korunuyor.',
      chartAi: [6.2, 7.1, 6.8, 7.9, 7.8], chartEng: [5.5, 6.0, 6.4, 6.7, 6.9], chartCycles: [43, 44, 45, 46, 47],
      moods: [
        { mood: 'Sakin & Odaklı', energy: 'orta', date: '18 Tem 22:40', trigger: 'Otomatik', summary: 'Aksam boyunca düşük tempolu, akustik ağırlıklı dinleme. Odaklanma seansına uygun bir seçki oluştu.', tags: ['lo-fi', 'indie folk', 'Bon Iver', 'Novo Amor'] },
        { mood: 'Enerjik', energy: 'yüksek', date: '16 Tem 08:12', trigger: 'Otomatik', summary: 'Sabah saatlerinde yüksek tempolu elektronik ve pop. Hareketli bir güne işaret ediyor.', tags: ['electropop', 'house', 'Fred again..'] },
        { mood: 'Melankolik', energy: 'düşük', date: '14 Tem 23:50', trigger: 'Manuel', summary: 'Gece geç saatte yavaş, duygusal parçalar. Sakinleşme eğilimi baskın.', tags: ['ambient', 'slowcore', 'Phoebe Bridgers'] },
      ],
      feedbacks: [
        { cycle: 47, score: '7.8', eng: '6.9', aiPct: 78, engPct: 69, analysis: 'Tasima limiti artışı işe yaradı; beğenilen şarkılar korundu ve ortalama çalma yükseldi.', date: '18 Tem', avg: '3.4' },
        { cycle: 46, score: '7.9', eng: '6.7', aiPct: 79, engPct: 67, analysis: 'Yuksek enerjili seçki kullanıcı ritmine iyi oturdu.', date: '16 Tem', avg: '3.1' },
        { cycle: 45, score: '6.8', eng: '6.4', aiPct: 68, engPct: 64, analysis: 'Keşif kontenjanı biraz fazla geldi; birkaç yeni şarkı atlandı.', date: '14 Tem', avg: '2.6' },
      ],
      patterns: [
        'Aksam saatlerinde sakin türlere yöneliyorsun; carry-over yüksek tutuldu.',
        'Hafta sonu keşif kontenjanı işe yarıyor — yeni sanatçı tutma oranı %38 arttı.',
        '* Önümüzdeki döngüde keşif kontenjanıni 5->6 çıkarmayı öneriyorum.',
      ],
      adaptBadge: 'güven %82 · iyileşme +1.1',
      archive: [
        { cycle: 47, date: '18 Tem 22:40', mood: 'Sakin & Odaklı', ai: '7.8', eng: '6.9', disc: '12', avg: '3.4' },
        { cycle: 46, date: '16 Tem 08:12', mood: 'Enerjik', ai: '7.9', eng: '6.7', disc: '9', avg: '3.1' },
        { cycle: 45, date: '14 Tem 23:50', mood: 'Melankolik', ai: '6.8', eng: '6.4', disc: '14', avg: '2.6' },
        { cycle: 44, date: '12 Tem 21:05', mood: 'Sakin', ai: '7.1', eng: '6.0', disc: '8', avg: '2.4' },
      ],
      playlistUrl: 'https://open.spotify.com/',
    };
  }

  // ---------- ascii primitives ----------
  pad(s, n) { s = String(s); return s.length > n ? s.slice(0, n) : s + ' '.repeat(n - s.length); }
  rj(s, n) { s = String(s); return s.length > n ? s.slice(0, n) : ' '.repeat(n - s.length) + s; }
  ctr(s, n) { s = String(s); if (s.length >= n) return s.slice(0, n); const t = n - s.length, l = Math.floor(t / 2); return ' '.repeat(l) + s + ' '.repeat(t - l); }
  lr(l, r, n) { l = String(l); r = String(r); if (l.length + r.length + 1 > n) l = l.slice(0, n - r.length - 1); return this.pad(l, n - r.length) + r; }
  wrap(text, w) { const words = String(text).split(/\s+/).filter(Boolean); const out = []; let c = ''; for (const word of words) { if (!c) c = word; else if ((c + ' ' + word).length <= w) c += ' ' + word; else { out.push(c); c = word; } } if (c) out.push(c); return out.length ? out : ['']; }
  bar(pct, w) { const f = Math.max(0, Math.min(w, Math.round((pct / 100) * w))); return '█'.repeat(f) + '░'.repeat(w - f); }

  box(title, lines, W, dbl) {
    const H = dbl ? { tl: '╔', tr: '╗', bl: '╚', br: '╝', h: '═', v: '║' } : { tl: '┌', tr: '┐', bl: '└', br: '┘', h: '─', v: '│' };
    const t = H.tl + H.h + ' ' + title + ' ';
    const top = t + H.h.repeat(Math.max(0, (W + 4) - t.length - 1)) + H.tr;
    const body = lines.map(l => H.v + ' ' + this.pad(l, W) + ' ' + H.v);
    const bot = H.bl + H.h.repeat(W + 2) + H.br;
    return [top, ...body, bot].join('\n');
  }
  colsJoin(cells, gap) {
    const h = Math.max(...cells.map(c => c.length));
    const out = [];
    for (let i = 0; i < h; i++) out.push(cells.map(c => c[i] || '').join(' '.repeat(gap)));
    return out;
  }

  get pal() {
    return {
      frame: '#4f6f5e', title: '#cfe3d6',
      ai: '#3ddc84', aiDim: '#28503b',
      real: '#ffb454', realDim: '#5f4526',
      lab: '#8fa896', txt: '#a7bcac', dim: '#6f8a92',
    };
  }
  richBox(title, richLines, W, opt) {
    opt = opt || {};
    const P = this.pal;
    const F = opt.frame || P.frame, T = opt.title || P.title, dbl = opt.dbl;
    const H = dbl ? { tl: '╔', tr: '╗', bl: '╚', br: '╝', h: '═', v: '║' } : { tl: '┌', tr: '┐', bl: '└', br: '┘', h: '─', v: '│' };
    const nodes = []; let k = 0;
    const sp = (c, t) => { if (t !== '') nodes.push(React.createElement('span', { key: k++, style: c ? { color: c } : undefined }, t)); };
    const tpre = H.tl + H.h + ' ' + title + ' ';
    sp(F, tpre + H.h.repeat(Math.max(0, (W + 4) - tpre.length - 1)) + H.tr + '\n');
    richLines.forEach(line => {
      sp(F, H.v + ' ');
      let len = 0;
      line.forEach(seg => { sp(seg.c || T, seg.t); len += seg.t.length; });
      if (len < W) sp(F, ' '.repeat(W - len));
      sp(F, ' ' + H.v + '\n');
    });
    sp(F, H.bl + H.h.repeat(W + 2) + H.br);
    return React.createElement(React.Fragment, null, ...nodes);
  }
  barSeg(pct, w, onColor, offColor) {
    const fn = Math.max(0, Math.min(w, Math.round((pct / 100) * w)));
    return [{ c: onColor, t: '█'.repeat(fn) }, { c: offColor, t: '░'.repeat(w - fn) }];
  }

  // ---------- panels ----------
  header(m, W) {
    const st = this.state.online ? 'ONLINE' : this.state.status.toUpperCase();
    const l1 = this.lr('SPOTIBOT  //  dinamik playlist yöneticisi', '[ ' + st + ' ]', W);
    const l2 = 'döngü ' + m.cycle + '  ·  son güncelleme ' + m.lastUpdate + (m.lastAgo ? '  (' + m.lastAgo + ')' : '');
    return this.box('sistem', [l1, this.pad(l2, W)], W, true);
  }

  stats(m, W) {
    const per = W < 60 ? 2 : 3;
    const gap = 2;
    const cw = Math.floor((W - gap * (per - 1)) / per);
    const cells = [
      ['DÖNGÜ', m.cycle, 'güncelleme'],
      ['SON GÜNCELLEME', m.lastUpdate, m.lastAgo || ''],
      ['RUH HALI', m.moodNow, 'enerji: ' + m.energyNow],
      ['AI SKORU', m.aiScore, '/ 10 · öz değerlendirme'],
      ['GERÇEK SKOR', m.realScore, '/ 10 · dinlemeden'],
      ['KEŞİF', m.discovery, 'yeni şarkı'],
    ].map(c => [this.pad(c[0], cw), this.pad(c[1], cw), this.pad(c[2], cw)]);
    const lines = [];
    for (let i = 0; i < cells.length; i += per) {
      if (i) lines.push('');
      this.colsJoin(cells.slice(i, i + per), gap).forEach(l => lines.push(l));
    }
    return this.box('genel durum', lines, W);
  }

  chart(m, W) {
    const P = this.pal;
    const ai = m.chartAi, eng = m.chartEng, cyc = m.chartCycles, n = ai.length;
    if (n < 2) return this.richBox('skor trendi', [[{ c: P.dim, t: this.pad('yeterli veri yok (min 2 döngü).', W) }]], W);
    const Hc = 6, all = ai.concat(eng);
    const mn = Math.floor(Math.min(...all) - 0.5), mx = Math.ceil(Math.max(...all) + 0.5), rng = (mx - mn) || 1;
    const lvl = v => Math.max(0, Math.min(Hc, Math.round((v - mn) / rng * Hc)));
    const gw = Math.floor(W / n);
    const rows = [];
    for (let r = Hc; r >= 1; r--) {
      const line = [];
      for (let i = 0; i < n; i++) {
        line.push({ c: P.ai, t: lvl(ai[i]) >= r ? '██' : '  ' });
        line.push({ c: null, t: ' ' });
        line.push({ c: P.real, t: lvl(eng[i]) >= r ? '██' : '  ' });
        const padn = gw - 5; if (padn > 0) line.push({ c: null, t: ' '.repeat(padn) });
      }
      rows.push(line);
    }
    rows.push([{ c: P.frame, t: '─'.repeat(W) }]);
    let lab = ''; for (let i = 0; i < n; i++) lab += this.ctr('#' + cyc[i], gw);
    rows.push([{ c: P.lab, t: this.pad(lab, W) }]);
    rows.push([{ c: null, t: '' }]);
    rows.push([{ c: P.ai, t: '██' }, { c: P.title, t: ' AI skoru' }, { c: null, t: '    ' }, { c: P.real, t: '██' }, { c: P.title, t: ' gerçek skor' }]);
    return this.richBox('skor trendi', rows, W);
  }

  trigger(m, W) {
    const lines = this.wrap('2 gün beklemeden playlist yenilenir. Bot dinleme geçmişini analiz edip yeni şarkılar seçer. Üstteki [şimdi güncelle] ile GitHub Actions döngüsü tetiklenir.', W);
    return this.box('manuel güncelleme', lines, W);
  }

  strategy(m, W) {
    const gap = 2, cw = Math.floor((W - gap * 2) / 3);
    const cells = [
      ['TAŞIMA LİMİTİ', m.carry, 'eski şarkı/döngü'],
      ['KEŞİF KOTASI', m.discoveryQ, 'dinlenmemiş şarkı'],
      ['ÇALMA SAYACI', m.plays, 'biriken çalma'],
    ].map(c => [this.pad(c[0], cw), this.pad(c[1], cw), this.pad(c[2], cw)]);
    const lines = this.colsJoin(cells, gap);
    lines.push('');
    this.wrap('> ' + m.strategyReason, W).forEach(l => lines.push(l));
    return this.box('bot stratejisi', lines, W);
  }

  moods(m, W) {
    const lines = [];
    if (!m.moods.length) lines.push(this.pad('henüz ruh hali verisi yok.', W));
    m.moods.forEach((x, i) => {
      if (i) lines.push('');
      lines.push(this.lr(x.mood + '  [' + x.energy + ']', x.date + ' · ' + x.trigger, W));
      this.wrap(x.summary, W - 2).forEach(l => lines.push('  ' + l));
      if (x.tags.length) lines.push('  ' + this.pad(x.tags.map(t => '#' + t.replace(/\s+/g, '_')).join(' '), W - 2));
    });
    return this.box('ruh hali geçmişi', lines, W);
  }

  feedback(m, W) {
    const P = this.pal;
    if (!m.feedbacks.length) return this.richBox('playlist geçmişi', [[{ c: P.dim, t: this.pad('henüz playlist geçmişi yok.', W) }]], W);
    const bw = Math.max(6, W - 17);
    const rows = [];
    m.feedbacks.forEach((f, i) => {
      if (i) rows.push([{ c: null, t: '' }]);
      rows.push([{ c: P.title, t: this.pad('#' + f.cycle + ' AI', 10) }, { c: P.frame, t: '[' }, ...this.barSeg(f.aiPct, bw, P.ai, P.aiDim), { c: P.frame, t: '] ' }, { c: P.ai, t: this.rj(f.score, 4) }]);
      rows.push([{ c: P.dim, t: this.pad('   gerçek', 10) }, { c: P.frame, t: '[' }, ...this.barSeg(f.engPct, bw, P.real, P.realDim), { c: P.frame, t: '] ' }, { c: P.real, t: this.rj(f.eng, 4) }]);
      this.wrap(f.analysis, W - 2).forEach(l => rows.push([{ c: P.txt, t: '  ' + l }]));
      rows.push([{ c: P.dim, t: this.lr('  ort. çalma: ' + f.avg, f.date, W) }]);
    });
    return this.richBox('playlist geçmişi', rows, W);
  }

  learn(m, W) {
    const lines = [this.pad('[ ' + m.adaptBadge + ' ]', W), ''];
    if (!m.patterns.length) { lines.push(this.pad('bot henüz öğrenme verisi toplamadı.', W)); this.wrap('3-4 döngü sonra örüntüler burada görünecek.', W).forEach(l => lines.push(l)); }
    m.patterns.forEach((p, i) => {
      if (i) lines.push('');
      const w = this.wrap(p, W - 2);
      w.forEach((l, j) => lines.push((j === 0 ? '» ' : '  ') + l));
    });
    return this.box('bot öğrenmeleri', lines, W);
  }

  archive(m, W) {
    const lines = [];
    if (!m.archive.length) { lines.push(this.pad('henüz arşiv yok.', W)); return this.box('playlist arşivi', lines, W); }
    if (W < 60) {
      m.archive.forEach((a, i) => {
        if (i) lines.push('');
        lines.push(this.pad('#' + a.cycle + ' · ' + a.date, W));
        lines.push(this.pad('  ' + a.mood, W));
        lines.push(this.pad('  AI ' + a.ai + ' · ger ' + a.eng + ' · keşif ' + a.disc + ' · ort ' + a.avg, W));
      });
    } else {
      const wc = 6, wt = 14, wai = 5, wg = 5, wk = 6, wo = 5;
      const wm = W - (wc + wt + wai + wg + wk + wo + 6);
      const row = (c) => this.pad(c[0], wc) + ' ' + this.pad(c[1], wt) + ' ' + this.pad(c[2], wm) + ' ' + this.rj(c[3], wai) + ' ' + this.rj(c[4], wg) + ' ' + this.rj(c[5], wk) + ' ' + this.rj(c[6], wo);
      lines.push(row(['DÖNGÜ', 'TARİH', 'RUH HALI', 'AI', 'GERÇ', 'KEŞİF', 'ORT']));
      lines.push('─'.repeat(W));
      m.archive.forEach(a => lines.push(row(['#' + a.cycle, a.date, a.mood, a.ai, a.eng, a.disc, a.avg])));
    }
    return this.box('playlist arşivi', lines, W);
  }

  renderVals() {
    const m = this.state.model || this.sample();
    const W = this.state.cols - 4;
    return {
      header: this.header(m, W),
      statsBlock: this.stats(m, W),
      chartBlock: this.chart(m, W),
      triggerBlock: this.trigger(m, W),
      strategyBlock: this.strategy(m, W),
      moodBlock: this.moods(m, W),
      feedbackBlock: this.feedback(m, W),
      learnBlock: this.learn(m, W),
      archiveBlock: this.archive(m, W),
      footer: 'gist ' + this.GIST.slice(0, 8) + '… · otomatik yenileme 2 dk · durum: ' + this.state.status,
      playlistUrl: m.playlistUrl,
      onRefresh: () => this.load(),
      onTrigger: () => window.open(this.BOT_REPO + '/actions/workflows/cycle.yml', '_blank'),
      onExcel: () => window.open(this.BOT_REPO, '_blank'),
    };
  }
}
</script>
